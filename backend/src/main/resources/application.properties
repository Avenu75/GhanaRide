# =============================================================
# GHANARIDE - BASE APPLICATION CONFIGURATION
# v5.2.2 WORLD CLASS – GHANA ONLY
# Shared across ALL environments (dev + prod)
# Environment-specific overrides in application-dev.properties
# and application-prod.properties
# =============================================================

# -------------------------------------------------------------
# APPLICATION
# -------------------------------------------------------------
spring.application.name=GhanaRide
app.name=GhanaRide
app.version=5.2.2
app.description=Ghana's Premium Intercity Booking Super-App – World Class v5
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -------------------------------------------------------------
# SERVER
# -------------------------------------------------------------
server.port=${PORT:8088}

# Compress responses (saves bandwidth in Ghana mobile networks)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Forward headers from Railway reverse proxy
server.forward-headers-strategy=framework

# Error handling – never leak stack traces
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# -------------------------------------------------------------
# DATABASE
# -------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.pool-name=GhanaRideHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# -------------------------------------------------------------
# JPA / HIBERNATE
# -------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Timezone – DB reads/writes UTC, app displays Africa/Accra
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# -------------------------------------------------------------
# FLYWAY
# -------------------------------------------------------------
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.table=flyway_schema_history

# -------------------------------------------------------------
# THYMELEAF
# -------------------------------------------------------------
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# -------------------------------------------------------------
# FILE UPLOAD
# -------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

app.upload.dir=${UPLOAD_DIR:uploads/cars/}
app.upload.dir.profiles=${UPLOAD_DIR_PROFILES:uploads/profiles/}
app.upload.allowed-types=image/jpeg,image/png,image/webp
app.upload.max-file-size=5242880

# -------------------------------------------------------------
# EMAIL (Gmail SMTP)
# -------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@ghanaride.me}
spring.mail.password=${MAIL_PASSWORD:secret}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

app.mail.from=${MAIL_USERNAME:noreply@ghanaride.me}
app.mail.from-name=GhanaRide Support
app.mail.reply-to=support@ghanaride.me

# -------------------------------------------------------------
# PAYSTACK PAYMENT – AFRICA FIRST
# -------------------------------------------------------------
paystack.secret.key=${PAYSTACK_SECRET_KEY:mock-paystack-secret}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:mock-paystack-public}
paystack.base-url=https://api.paystack.co
paystack.webhook.secret=${PAYSTACK_WEBHOOK_SECRET:mock-paystack-webhook}
paystack.currency=GHS

# Mobile Money – MTN MoMo / Vodafone Cash – v5
app.pay.momo.enabled=true
app.pay.vodafone-cash.enabled=true
app.pay.wallet.enabled=true
app.pay.apple-pay.enabled=true

# -------------------------------------------------------------
# GOOGLE OAUTH2 – v3.1 CLEAN – 500 FIXED
# -------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google

# -------------------------------------------------------------
# GOOGLE MAPS – v5.2 BOLT-STYLE – GHANA ONLY
# -------------------------------------------------------------
# Get key: https://console.cloud.google.com/apis/credentials
# Enable: Maps JavaScript API, Directions API, Geocoding API, Places API
# Restrict HTTP referrers: ghanaride.me/*, *.ghanaride.me/*, localhost:*
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
# map.provider: google | osm
# blank GOOGLE_MAPS_API_KEY → auto OSM fallback – still Ghana-only
map.provider=${MAP_PROVIDER:google}

# -------------------------------------------------------------
# CACHING (Caffeine)
# -------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m
app.cache.routes=routes
app.cache.fares=fares
app.cache.cities=cities

# -------------------------------------------------------------
# SESSION
# -------------------------------------------------------------
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=GHANARIDE_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# -------------------------------------------------------------
# SECURITY
# -------------------------------------------------------------
app.security.remember-me-validity=2592000
app.security.remember-me-key=${REMEMBER_ME_KEY:change-this-in-production}
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15
app.security.password-reset-expiry-hours=24
app.security.email-verification-expiry-hours=48

# JWT – future mobile API
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-string-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# -------------------------------------------------------------
# ACTUATOR
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true
management.info.build.enabled=true
management.info.git.enabled=true
management.endpoint.health.group.readiness.include=db,diskSpace
management.endpoint.health.group.liveness.include=ping
management.health.mail.enabled=false

info.app.name=${app.name}
info.app.version=${app.version}
info.app.description=${app.description}

# -------------------------------------------------------------
# LOGGING
# -------------------------------------------------------------
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.ghanaride=INFO

# -------------------------------------------------------------
# APP – GHANA ONLY – WORLD CLASS v5.2
# -------------------------------------------------------------
app.base-url=${APP_BASE_URL:https://ghanaride.me}

# --- Ghana localization – SINGLE SOURCE OF TRUTH ---
app.country=GH
app.country.lock=true
app.currency=GHS
app.currency.lock=true
app.currency-symbol=GH₵
app.timezone=Africa/Accra
app.locale=en-GH

# Phone – unify dot-notation (was app.phone-prefix before – removed duplicate)
app.phone.prefix=+233
app.phone.strict-ghana=true
# Ghana mobile prefixes: 020,023,024,025,026,027,028,050,053,054,055,056,057,059

# Geofence – Ghana bounding box
app.geo.lat-min=4.5
app.geo.lat-max=11.2
app.geo.lng-min=-3.3
app.geo.lng-max=1.2
app.locations.ghana-only=true

# Popular routes – Ghana intercity only
app.routes.popular=Accra-Kumasi,Accra-Cape Coast,Accra-Tamale,Kumasi-Tamale,Accra-Takoradi,Accra-Ho,Kumasi-Cape Coast

# Fare config – GHS
app.fare.base-rate=0.80
app.fare.service-fee-percent=12
app.fare.minimum-fare=15.00

# SMS – Hubtel Ghana
app.sms.provider=hubtel
app.sms.hubtel.client-id=${HUBTEL_CLIENT_ID:}
app.sms.hubtel.client-secret=${HUBTEL_CLIENT_SECRET:}
app.sms.hubtel.sender-id=GhanaRide

# Support – Ghana
app.support.email=support@ghanaride.me
app.support.phone=+233XXXXXXXXX
app.support.whatsapp=${SUPPORT_WHATSAPP:+233XXXXXXXXX}

# Social
app.social.facebook=${FACEBOOK_URL:}
app.social.twitter=${TWITTER_URL:}
app.social.instagram=${INSTAGRAM_URL:}

# -------------------------------------------------------------
# v5.2 FEATURE FLAGS – WORLD CLASS
# -------------------------------------------------------------
app.features.seat-map=true
app.features.live-tracking=true
app.features.wallet=true
app.features.qr-boarding=true
app.features.reviews=true
app.features.google-maps=true
app.features.coupons=true
app.features.multi-passenger=true
app.features.instant-refund=true
app.features.loyalty-cashback=true

# Booking – world class tuning
app.booking.cancel-window-minutes=120
app.booking.seat-hold-minutes=7
app.booking.auto-assign-seat=true
app.booking.require-ghana-phone=true
app.booking.max-passengers-per-booking=4

# Wallet – GhanaRide Pay
app.wallet.currency=GHS
app.wallet.min-topup=5.00
app.wallet.loyalty-rate=0.02

# Real-time
app.websocket.enabled=true
app.websocket.endpoint=/ws-ghanaride
app.tracking.update-interval-seconds=5