<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment - GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/my-bookings}" class="text-warning text-decoration-none">My Bookings</a></li>
                        <li class="breadcrumb-item active text-muted">Payment</li>
                    </ol>
                </nav>
                <h2 class="text-light fw-bold mb-1">Select Payment Method</h2>
                <p class="text-muted">Choose how you want to pay for your trip to <span th:text="${booking.trip.toLocation}"></span>.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card bg-dark border-secondary mb-4 shadow">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="text-light mb-0">Total Amount to Pay</h5>
                        <h3 class="text-warning mb-0 fw-bold">GHC <span th:text="${booking.totalAmount}">0.00</span></h3>
                    </div>
                    <hr class="border-secondary">
                    <div class="small text-muted mb-4">
                        <i class="bi bi-info-circle me-1"></i> Booking Reference: <strong class="text-light" th:text="${booking.bookingReference}"></strong>
                    </div>

                    <div class="row g-3">
                        <!-- Pay with Paystack (Simulated) -->
                        <div class="col-12">
                            <button class="btn btn-secondary w-100 py-3 text-start d-flex align-items-center position-relative overflow-hidden payment-btn disabled"
                                    style="opacity: 0.6; cursor: not-allowed;" title="Payment mode unavailable at the moment. Please pay directly to the driver.">
                                <div class="d-flex justify-content-center align-items-center bg-white rounded p-2 me-3" style="width: 50px; height: 50px;">
                                    <i class="bi bi-credit-card-fill text-secondary fs-3"></i>
                                </div>
                                <div>
                                    <div class="fw-bold fs-5 text-white">Pay Online</div>
                                    <div class="small text-white-50">Currently Unavailable. Please pay driver directly.</div>
                                </div>
                            </button>
                        </div>

                        <!-- Pay with Cash -->
                        <div class="col-12">
                            <form th:action="@{/payment/{id}/cash(id=${booking.id})}" method="post">
                                <button type="submit" class="btn btn-outline-light w-100 py-3 text-start d-flex align-items-center position-relative payment-btn">
                                    <div class="d-flex justify-content-center align-items-center bg-dark rounded p-2 me-3 border border-secondary" style="width: 50px; height: 50px;">
                                        <i class="bi bi-cash-stack text-success fs-3"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold fs-5">Pay Driver (Cash / MoMo)</div>
                                        <div class="small text-muted">Pay the driver at the pickup point</div>
                                    </div>
                                    <i class="bi bi-chevron-right text-muted position-absolute end-0 me-3 fs-4"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Simulated Paystack Modal -->
    <div class="modal fade" id="paystackModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-shield-check text-success me-2"></i>Secure Checkout (Simulated)</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-5">
                    <i class="bi bi-credit-card-2-front text-primary display-1 mb-3"></i>
                    <h4>Processing Payment...</h4>
                    <p class="text-muted mb-4">This simulates the Paystack checkout popup.</p>
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div class="modal-footer border-secondary d-flex justify-content-center">
                    <a th:href="@{/payment/verify(reference=${booking.bookingReference})}" class="btn btn-success px-4">
                        Simulate Successful Payment
                    </a>
                </div>
            </div>
        </div>
    </div>

    <style>
        .payment-btn {
            transition: all 0.2s ease;
            border-radius: 12px;
        }
        .payment-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-primary.payment-btn {
            background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%);
            border: none;
        }
        .btn-primary.payment-btn:hover {
            background: linear-gradient(135deg, #098e53 0%, #32a17e 100%);
        }
    </style>
</main>
</body>
</html>
