# =============================================================
# GHANARIDE - PRODUCTION CONFIGURATION
# v5.2.2 WORLD CLASS – GHANA ONLY
# =============================================================

# -------------------------------------------------------------
# APPLICATION
# -------------------------------------------------------------
spring:
  application:
    name: GhanaRide

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # -------------------------------------------------------------
  # DATABASE (MySQL on Railway/Production)
  # -------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: GhanaRideHikariPool
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  # -------------------------------------------------------------
  # JPA / HIBERNATE
  # -------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 20
        jdbc.time_zone: UTC
    open-in-view: false

  # -------------------------------------------------------------
  # FLYWAY
  # -------------------------------------------------------------
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

  # -------------------------------------------------------------
  # THYMELEAF
  # -------------------------------------------------------------
  thymeleaf:
    encoding: UTF-8
    mode: HTML
    servlet:
      content-type: text/html
    cache: false

  # -------------------------------------------------------------
  # FILE UPLOAD & SESSION (SERVLET)
  # -------------------------------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 2KB
    session:
      cookie:
        name: GHANARIDE_SESSION
        http-only: true
        secure: true
        same-site: lax

  # -------------------------------------------------------------
  # SESSION
  # -------------------------------------------------------------
  session:
    timeout: 30m

  # -------------------------------------------------------------
  # EMAIL (Gmail SMTP)
  # -------------------------------------------------------------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@ghanaride.me}
    password: ${MAIL_PASSWORD:secret}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            trust: smtp.gmail.com

  # -------------------------------------------------------------
  # CACHING (Caffeine)
  # -------------------------------------------------------------
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  # -------------------------------------------------------------
  # SECURITY OAUTH2 (Google)
  # -------------------------------------------------------------
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
            scope: openid,profile,email
            redirect-uri: ${APP_BASE_URL}/login/oauth2/code/google

# -------------------------------------------------------------
# SERVER (top-level, NOT nested under spring)
# -------------------------------------------------------------
server:
  port: ${PORT:8088}
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
    min-response-size: 1024
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never
    whitelabel:
      enabled: false

# -------------------------------------------------------------
# APPLICATION SPECIFIC
# -------------------------------------------------------------
app:
  name: GhanaRide
  version: 5.2.2
  description: Ghana's Premium Intercity Booking Super-App – World Class v5
  base-url: ${APP_BASE_URL:https://ghanaride.me}

  upload:
    dir: ${UPLOAD_DIR:uploads/cars/}
    dir-profiles: ${UPLOAD_DIR_PROFILES:uploads/profiles/}
    allowed-types: image/jpeg,image/png,image/webp
    max-file-size: 5242880

  mail:
    from: ${MAIL_USERNAME:noreply@ghanaride.me}
    from-name: GhanaRide Support
    reply-to: support@ghanaride.me

  # -------------------------------------------------------------
  # PAYSTACK PAYMENT
  # -------------------------------------------------------------
  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY:mock-paystack-secret}
    public-key: ${PAYSTACK_PUBLIC_KEY:mock-paystack-public}
    base-url: https://api.paystack.co
    webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:mock-paystack-webhook}
    currency: GHS

  # Mobile Money
  pay:
    momo:
      enabled: true
    vodafone-cash:
      enabled: true
    wallet:
      enabled: true
    apple-pay:
      enabled: true

  # -------------------------------------------------------------
  # GOOGLE MAPS
  # -------------------------------------------------------------
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}

  map:
    provider: ${MAP_PROVIDER:google}

  # -------------------------------------------------------------
  # CACHE NAMES
  # -------------------------------------------------------------
  cache:
    routes: routes
    fares: fares
    cities: cities

  # -------------------------------------------------------------
  # SECURITY
  # -------------------------------------------------------------
  security:
    remember-me-validity: 1209600  # 14 days
    remember-me-key: ${REMEMBER_ME_KEY:change-this-in-production}
    max-login-attempts: 5
    lockout-duration-minutes: 15
    password-reset-expiry-hours: 24
    email-verification-expiry-hours: 48

  # -------------------------------------------------------------
  # JWT (Future mobile API)
  # -------------------------------------------------------------
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-random-string-at-least-256-bits}
    expiration: 86400000  # 24 hours

# -------------------------------------------------------------
# LOGGING
# -------------------------------------------------------------
logging:
  level:
    com.ghanaride: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ghanaride.log
    max-size: 10MB
    max-history: 30

# -------------------------------------------------------------
# ACTUATOR
# -------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# -------------------------------------------------------------
# OPEN API / SWAGGER
# -------------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method