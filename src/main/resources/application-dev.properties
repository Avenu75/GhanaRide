# =============================================================
# GHANARIDE - DEVELOPMENT PROFILE
# Used when running locally
# Activate with: --spring.profiles.active=dev
# OR set SPRING_PROFILES_ACTIVE=dev
# =============================================================

# -------------------------------------------------------------
# DATABASE (local H2 file-based to persist across restarts)
# -------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/ghanaridedb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Smaller pool for local dev
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Show SQL in dev for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# In dev, allow schema changes without Flyway
# (comment out when testing Flyway locally)
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# -------------------------------------------------------------
# THYMELEAF (disable cache for hot reload)
# -------------------------------------------------------------
spring.thymeleaf.cache=false

# -------------------------------------------------------------
# LOGGING (verbose in dev)
# -------------------------------------------------------------
logging.level.com.ghanaride=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# -------------------------------------------------------------
# APP URLS (local)
# -------------------------------------------------------------
app.base-url=http://localhost:8088

# -------------------------------------------------------------
# EMAIL (use Mailhog or Mailtrap locally
# so you don't send real emails during dev)
# -------------------------------------------------------------
# Option A: Mailhog (run: docker run -p 1025:1025 mailhog/mailhog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@ghanaride.me
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Option B: Use real Gmail (uncomment and fill in)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your_email@gmail.com
# spring.mail.password=your_app_password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# -------------------------------------------------------------
# PAYSTACK (use test keys in dev — NEVER live keys!)
# -------------------------------------------------------------
paystack.secret.key=sk_test_your_test_key_here
paystack.public.key=pk_test_your_test_key_here
paystack.webhook.secret=test_webhook_secret

# -------------------------------------------------------------
# GOOGLE OAUTH2 (use your dev credentials)
# -------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=your_dev_client_id
spring.security.oauth2.client.registration.google.client-secret=your_dev_client_secret

# -------------------------------------------------------------
# SECURITY (relaxed for dev)
# -------------------------------------------------------------
server.servlet.session.cookie.secure=false
app.security.remember-me-key=dev-remember-me-key-not-secret

# -------------------------------------------------------------
# ACTUATOR (expose everything in dev)
# -------------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# -------------------------------------------------------------
# DEVTOOLS
# -------------------------------------------------------------
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true