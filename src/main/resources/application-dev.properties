spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/ghanaride?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

logging.level.com.ghanaride=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

app.base-url=${APP_BASE_URL:http://localhost:8088}
server.servlet.session.cookie.secure=false
app.security.remember-me-key=${REMEMBER_ME_KEY:dev-remember-me-key-not-secret}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:noreply@ghanaride.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_mock_key}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:pk_test_mock_key}
paystack.webhook.secret=${PAYSTACK_WEBHOOK_SECRET:test_webhook_secret}

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

server.error.include-stacktrace=always
server.error.include-message=always
logging.file.name=logs/spring.log

logging.file.name=spring-app.log
