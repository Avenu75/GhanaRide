spring.application.name=GhanaRide
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

app.name=GhanaRide
app.version=1.0.0
app.description=Ghana-based campus and intercity transport booking platform
app.base-url=${APP_BASE_URL:http://localhost:8088}

server.port=${PORT:8088}
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ghanaride?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=GhanaRideHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.table=flyway_schema_history

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

app.upload.dir=${UPLOAD_DIR:uploads/cars/}
app.upload.dir.profiles=${UPLOAD_DIR_PROFILES:uploads/profiles/}
app.upload.allowed-types=image/jpeg,image/png,image/webp
app.upload.max-file-size=5242880

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:noreply@ghanaride.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:noreply@ghanaride.local}}
app.mail.from-name=${MAIL_FROM_NAME:GhanaRide Support}
app.mail.reply-to=${MAIL_REPLY_TO:support@ghanaride.local}

paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_mock_key}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:pk_test_mock_key}
paystack.base-url=${PAYSTACK_BASE_URL:https://api.paystack.co}
paystack.webhook.secret=${PAYSTACK_WEBHOOK_SECRET:test_webhook_secret}
paystack.currency=GHS

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google

google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
map.provider=${MAP_PROVIDER:osm}

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

server.servlet.session.timeout=30m
server.servlet.session.cookie.name=GHANARIDE_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

app.security.remember-me-validity=2592000
app.security.remember-me-key=${REMEMBER_ME_KEY:dev-remember-me-key-not-secret}
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15
app.security.password-reset-expiry-hours=24
app.security.email-verification-expiry-hours=48

app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-string-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.health.mail.enabled=false

info.app.name=${app.name}
info.app.version=${app.version}
info.app.description=${app.description}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.ghanaride=INFO

app.country=GH
app.currency=GHS
app.currency-symbol=GH₵
app.timezone=Africa/Accra
app.locale=en-GH
app.phone.prefix=+233
app.phone.strict-ghana=true
app.geo.lat-min=4.5
app.geo.lat-max=11.2
app.geo.lng-min=-3.3
app.geo.lng-max=1.2
app.locations.ghana-only=true
app.routes.popular=Accra-Kumasi,Accra-Cape Coast,Accra-Tamale,Kumasi-Tamale,Accra-Takoradi,Accra-Ho,Kumasi-Cape Coast
app.fare.base-rate=0.80
app.fare.service-fee-percent=12
app.fare.minimum-fare=15.00
app.support.email=support@ghanaride.local
app.support.phone=+233000000000
app.features.seat-map=true
app.features.live-tracking=true
app.features.wallet=true
app.features.qr-boarding=true
app.features.reviews=true
app.features.google-maps=true
app.features.coupons=true
app.features.multi-passenger=true
app.features.instant-refund=true
app.features.loyalty-cashback=true
app.booking.cancel-window-minutes=120
app.booking.seat-hold-minutes=7
app.booking.auto-assign-seat=true
app.booking.require-ghana-phone=true
app.booking.max-passengers-per-booking=4
app.wallet.currency=GHS
app.wallet.min-topup=5.00
app.wallet.loyalty-rate=0.02
app.websocket.enabled=true
app.websocket.endpoint=/ws
app.tracking.update-interval-seconds=5
