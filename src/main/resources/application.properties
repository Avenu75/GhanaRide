# =============================================================
# GHANARIDE - BASE APPLICATION CONFIGURATION
# Shared across ALL environments (dev + prod)
# Environment-specific overrides in application-dev.properties
# and application-prod.properties
# =============================================================

# -------------------------------------------------------------
# APPLICATION
# -------------------------------------------------------------
spring.application.name=GhanaRide
app.name=GhanaRide
app.version=1.0.0
app.description=Ghana's Trusted Campus and Intercity Transport Platform

# Active profile is set by Railway environment variable
# or defaults to 'dev' locally
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -------------------------------------------------------------
# SERVER
# -------------------------------------------------------------
server.port=${PORT:8088}

# Compress responses (saves bandwidth in Ghana mobile networks)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Forward headers from Railway's reverse proxy
server.forward-headers-strategy=framework

# -------------------------------------------------------------
# DATABASE (values must come from environment variables)
# -------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
# Keeps DB connections warm, handles peak booking times
spring.datasource.hikari.pool-name=GhanaRideHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
# Keep connections alive (important for Railway which may
# close idle DB connections)
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# -------------------------------------------------------------
# JPA / HIBERNATE
# -------------------------------------------------------------
# Changed to 'update' because Flyway migration files do not exist.
# This allows Hibernate to automatically create/update database tables in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Performance: batch inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Prevent N+1 query problems
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Open session in view = false (best practice,
# avoids lazy loading issues leaking into controllers)
spring.jpa.open-in-view=false

# -------------------------------------------------------------
# FLYWAY (Database Migrations)
# -------------------------------------------------------------
# Disabled because there are no migration files under classpath:db/migration.
# Tables are managed by Hibernate's ddl-auto=update.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
# Table name for Flyway's migration history
spring.flyway.table=flyway_schema_history

# -------------------------------------------------------------
# THYMELEAF
# -------------------------------------------------------------
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.servlet.content-type=text/html
# Cache is OFF by default here,
# overridden per-environment below

# -------------------------------------------------------------
# FILE UPLOAD
# -------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Upload directories
app.upload.dir=${UPLOAD_DIR:uploads/cars/}
app.upload.dir.profiles=${UPLOAD_DIR_PROFILES:uploads/profiles/}

# Allowed file types for uploads
app.upload.allowed-types=image/jpeg,image/png,image/webp
app.upload.max-file-size=5242880

# -------------------------------------------------------------
# EMAIL (Gmail SMTP)
# -------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@ghanaride.me}
spring.mail.password=${MAIL_PASSWORD:secret}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Retry failed emails
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Email sender details
app.mail.from=${MAIL_USERNAME:noreply@ghanaride.me}
app.mail.from-name=GhanaRide Support
app.mail.reply-to=support@ghanaride.me

# -------------------------------------------------------------
# PAYSTACK PAYMENT
# -------------------------------------------------------------
paystack.secret.key=${PAYSTACK_SECRET_KEY:mock-paystack-secret}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:mock-paystack-public}
paystack.base-url=https://api.paystack.co
paystack.webhook.secret=${PAYSTACK_WEBHOOK_SECRET:mock-paystack-webhook}
# Supported currencies
paystack.currency=GHS

# -------------------------------------------------------------
# GOOGLE OAUTH2
# -------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google

# -------------------------------------------------------------
# CACHING (Caffeine)
# -------------------------------------------------------------
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Cache names used in the application
app.cache.routes=routes
app.cache.fares=fares
app.cache.cities=cities

# -------------------------------------------------------------
# SESSION
# -------------------------------------------------------------
# Use database-backed sessions (survives app restart)
# Switch to Redis when scaling
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=GHANARIDE_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# -------------------------------------------------------------
# SECURITY
# -------------------------------------------------------------
# Remember-me token validity (30 days)
app.security.remember-me-validity=2592000
app.security.remember-me-key=${REMEMBER_ME_KEY:change-this-in-production}

# Max login attempts before lockout
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15

# Password reset token validity
app.security.password-reset-expiry-hours=24

# Email verification token validity
app.security.email-verification-expiry-hours=48

# JWT settings (for future mobile API)
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-string-in-production}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# -------------------------------------------------------------
# ACTUATOR (Health checks for Railway)
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true
management.info.build.enabled=true
management.info.git.enabled=true

# Health check groups
management.endpoint.health.group.readiness.include=db,diskSpace
management.endpoint.health.group.liveness.include=ping

# Disable Mail Health Indicator since SMTP might not be available or fail locally
management.health.mail.enabled=false

# App info shown at /actuator/info
info.app.name=${app.name}
info.app.version=${app.version}
info.app.description=${app.description}

# -------------------------------------------------------------
# LOGGING (Base — overridden per environment)
# -------------------------------------------------------------
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Mask sensitive data in logs
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.ghanaride=INFO

# -------------------------------------------------------------
# APP SPECIFIC
# -------------------------------------------------------------
app.base-url=${APP_BASE_URL:https://ghanaride.me}

# Ghana-specific settings
app.country=GH
app.currency=GHS
app.currency-symbol=GH₵
app.timezone=Africa/Accra
app.phone-prefix=+233

# Popular routes (for homepage/fare estimator)
app.routes.popular=Accra-Kumasi,Accra-Cape Coast,\
  Accra-Tamale,Kumasi-Tamale,Accra-Takoradi,\
  Accra-Ho,Kumasi-Cape Coast

# Fare configuration (GHS per km base rate)
app.fare.base-rate=0.80
app.fare.service-fee-percent=12
app.fare.minimum-fare=15.00

# SMS Provider (Hubtel — most popular in Ghana)
app.sms.provider=hubtel
app.sms.hubtel.client-id=${HUBTEL_CLIENT_ID:}
app.sms.hubtel.client-secret=${HUBTEL_CLIENT_SECRET:}
app.sms.hubtel.sender-id=GhanaRide

# Support contacts
app.support.email=support@ghanaride.me
app.support.phone=+233XXXXXXXXX
app.support.whatsapp=${SUPPORT_WHATSAPP:+233XXXXXXXXX}

# Social media
app.social.facebook=${FACEBOOK_URL:}
app.social.twitter=${TWITTER_URL:}
app.social.instagram=${INSTAGRAM_URL:}

# Error handling
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false