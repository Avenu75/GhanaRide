<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="scripts">
    
    <!-- Bootstrap JS Bundle (Popper included) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
            crossorigin="anonymous"></script>

    <!-- GhanaRide Design System JS -->
    <script th:inline="javascript">
        /* ========================================================
         * GHANARIDE DESIGN SYSTEM - Core JavaScript
         * Handles: Theme, Toasts, PWA, Navbar, Forms, WebSocket
         * ======================================================== */
        
        (function() {
            'use strict';
            
            // ---- GLOBAL STATE ----
            const GR = window.GhanaRide = {
                config: {
                    apiBase: '/api',
                    wsUrl: 'wss://ghanaride.me/ws',
                    toastDuration: 5000
                },
                state: {
                    theme: 'light',
                    ws: null,
                    wsReconnectAttempts: 0,
                    wsMaxReconnectAttempts: 5
                },
                utils: {}
            };

            // ---- THEME MANAGEMENT ----
            GR.utils.initTheme = function() {
                // Check localStorage first, then system preference
                const saved = localStorage.getItem('gr_theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = saved || (systemDark ? 'dark' : 'light');
                GR.utils.setTheme(theme);
                
                // Listen for system changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                    if (!localStorage.getItem('gr_theme')) {
                        GR.utils.setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            };

            GR.utils.setTheme = function(theme) {
                GR.state.theme = theme;
                document.documentElement.setAttribute('data-bs-theme', theme);
                localStorage.setItem('gr_theme', theme);
                
                // Update icon
                const icon = document.getElementById('themeIcon');
                if (icon) {
                    icon.className = theme === 'dark' ? 'bi bi-sun-fill fs-6' : 'bi bi-moon-fill fs-6';
                }
                
                // Dispatch event for other components
                window.dispatchEvent(new CustomEvent('gr:themechange', { detail: { theme } }));
            };

            GR.utils.toggleTheme = function() {
                GR.utils.setTheme(GR.state.theme === 'dark' ? 'light' : 'dark');
            };

            // ---- TOAST NOTIFICATIONS ----
            GR.utils.showToast = function(message, type = 'info', duration = GR.config.toastDuration) {
                const container = GR.utils.getToastContainer();
                const toastEl = document.createElement('div');
                
                const icons = {
                    success: 'bi-check-circle-fill',
                    error: 'bi-x-circle-fill',
                    warning: 'bi-exclamation-triangle-fill',
                    info: 'bi-info-circle-fill'
                };
                
                const bgClasses = {
                    success: 'bg-success',
                    error: 'bg-danger',
                    warning: 'bg-warning text-dark',
                    info: 'bg-info'
                };
                
                toastEl.className = `toast ${bgClasses[type] || 'bg-info'} text-white`;
                toastEl.setAttribute('role', 'alert');
                toastEl.setAttribute('aria-live', 'assertive');
                toastEl.setAttribute('aria-atomic', 'true');
                toastEl.innerHTML = `
                    <div class="toast-header ${bgClasses[type] || 'bg-info'} text-white">
                        <i class="bi ${icons[type] || icons.info} me-2"></i>
                        <strong class="me-auto">${type.charAt(0).toUpperCase() + type.slice(1)}</strong>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                    <div class="toast-body">${message}</div>
                `;
                
                container.appendChild(toastEl);
                const toast = new bootstrap.Toast(toastEl, { delay: duration });
                toast.show();
                
                // Remove from DOM after hidden
                toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
                
                return toast;
            };

            GR.utils.getToastContainer = function() {
                let container = document.getElementById('gr-toast-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'gr-toast-container';
                    container.className = 'toast-container position-fixed bottom-0 end-0 p-3';
                    container.style.zIndex = '1080';
                    document.body.appendChild(container);
                }
                return container;
            };

            // Auto-show flash messages from server (Thymeleaf session attributes)
            GR.utils.showFlashMessages = function() {
                // Success messages
                const successEl = document.getElementById('gr-flash-success');
                if (successEl && successEl.textContent.trim()) {
                    GR.utils.showToast(successEl.textContent.trim(), 'success');
                    successEl.remove();
                }
                
                // Error messages
                const errorEl = document.getElementById('gr-flash-error');
                if (errorEl && errorEl.textContent.trim()) {
                    GR.utils.showToast(errorEl.textContent.trim(), 'error');
                    errorEl.remove();
                }
            };

            // ---- PASSWORD VISIBILITY TOGGLE ----
            GR.utils.initPasswordToggles = function() {
                document.querySelectorAll('[data-toggle-password]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const targetId = this.getAttribute('data-toggle-password');
                        const input = document.getElementById(targetId);
                        const icon = this.querySelector('i');
                        
                        if (input && icon) {
                            if (input.type === 'password') {
                                input.type = 'text';
                                icon.classList.replace('bi-eye', 'bi-eye-slash');
                            } else {
                                input.type = 'password';
                                icon.classList.replace('bi-eye-slash', 'bi-eye');
                            }
                        }
                    });
                });
            };

            // ---- FORM LOADING STATES ----
            GR.utils.initFormLoading = function() {
                document.querySelectorAll('form[data-loading]').forEach(form => {
                    form.addEventListener('submit', function(e) {
                        const submitBtn = form.querySelector('button[type="submit"], input[type="submit"]');
                        if (submitBtn && !submitBtn.disabled) {
                            submitBtn.disabled = true;
                            submitBtn.dataset.originalText = submitBtn.innerHTML;
                            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Processing...';
                            
                            // Re-enable after 10s as safety net
                            setTimeout(() => {
                                if (submitBtn.disabled) {
                                    submitBtn.disabled = false;
                                    submitBtn.innerHTML = submitBtn.dataset.originalText;
                                }
                            }, 10000);
                        }
                    });
                });
            };

            // ---- NAVBAR SCROLL EFFECT ----
            GR.utils.initNavbarScroll = function() {
                const navbar = document.getElementById('mainNavbar');
                if (!navbar) return;
                
                let lastScroll = 0;
                window.addEventListener('scroll', () => {
                    const currentScroll = window.pageYOffset;
                    
                    if (currentScroll > 100) {
                        navbar.classList.add('navbar-scrolled');
                    } else {
                        navbar.classList.remove('navbar-scrolled');
                    }
                    
                    lastScroll = currentScroll;
                }, { passive: true });
            };

            // ---- PWA INSTALL PROMPT ----
            GR.utils.initPWA = function() {
                let deferredPrompt;
                
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    
                    const installBtn = document.getElementById('installAppBtn');
                    if (installBtn) {
                        installBtn.classList.remove('d-none');
                        installBtn.onclick = async () => {
                            installBtn.classList.add('d-none');
                            deferredPrompt.prompt();
                            const { outcome } = await deferredPrompt.userChoice;
                            console.log('PWA install outcome:', outcome);
                            deferredPrompt = null;
                        };
                    }
                });

                window.addEventListener('appinstalled', () => {
                    console.log('GhanaRide PWA installed');
                    GR.utils.showToast('App installed! Enjoy offline access.', 'success');
                });

                // Register Service Worker
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('/sw.js')
                            .then(reg => console.log('SW registered:', reg.scope))
                            .catch(err => console.log('SW registration failed:', err));
                    });
                }
            };

            // ---- WEBSOCKET REAL-TIME UPDATES ----
            GR.utils.initWebSocket = function() {
                if (!window.WebSocket) return;
                
                // Only connect if authenticated (check for user dropdown)
                if (!document.querySelector('[sec\\:authorize="isAuthenticated()"]')) return;
                
                GR.state.ws = new WebSocket(GR.config.wsUrl);
                
                GR.state.ws.onopen = () => {
                    console.log('WebSocket connected');
                    GR.state.wsReconnectAttempts = 0;
                };
                
                GR.state.ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        GR.utils.handleWSMessage(data);
                    } catch (err) {
                        console.warn('WS message parse error:', err);
                    }
                };
                
                GR.state.ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    GR.utils.reconnectWS();
                };
                
                GR.state.ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };
            };

            GR.utils.reconnectWS = function() {
                if (GR.state.wsReconnectAttempts < GR.state.wsMaxReconnectAttempts) {
                    GR.state.wsReconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(2, GR.state.wsReconnectAttempts), 30000);
                    console.log(`Reconnecting in ${delay}ms (attempt ${GR.state.wsReconnectAttempts})`);
                    setTimeout(GR.utils.initWebSocket, delay);
                }
            };

            GR.utils.handleWSMessage = function(data) {
                switch (data.type) {
                    case 'booking_update':
                        GR.utils.showToast(`Booking ${data.bookingRef}: ${data.status}`, 'info');
                        // Refresh booking badge if on dashboard
                        GR.utils.updateBookingBadge();
                        break;
                    case 'trip_update':
                        GR.utils.showToast(`Trip update: ${data.message}`, 'info');
                        break;
                    case 'notification':
                        GR.utils.showToast(data.message, data.level || 'info');
                        GR.utils.updateNotificationBadge(data.unreadCount);
                        break;
                    case 'wallet_update':
                        GR.utils.updateWalletBalance(data.newBalance);
                        break;
                }
            };

            GR.utils.updateNotificationBadge = function(count) {
                const badge = document.getElementById('notifBadge');
                if (badge) {
                    badge.textContent = count;
                    badge.style.display = count > 0 ? 'block' : 'none';
                }
            };

            GR.utils.updateBookingBadge = function() {
                // Could fetch via HTMX or simple fetch
                fetch('/api/user/booking-count')
                    .then(r => r.json())
                    .then(data => {
                        const badge = document.getElementById('bookingBadge');
                        if (badge) badge.textContent = data.count;
                    })
                    .catch(() => {});
            };

            GR.utils.updateWalletBalance = function(balance) {
                const el = document.getElementById('walletBalance');
                if (el) el.textContent = `GH₵${balance.toFixed(2)}`;
            };

            // ---- AUTOCOMPLETE / INPUTMODE FOR MOBILE ----
            GR.utils.enhanceFormInputs = function() {
                // Phone inputs
                document.querySelectorAll('input[type="tel"], input[name*="phone"], input[name*="Phone"]').forEach(input => {
                    input.setAttribute('inputmode', 'tel');
                    input.setAttribute('autocomplete', 'tel');
                });
                
                // Email inputs
                document.querySelectorAll('input[type="email"]').forEach(input => {
                    input.setAttribute('autocomplete', 'email');
                });
                
                // Name inputs
                document.querySelectorAll('input[name*="name"], input[name*="Name"]').forEach(input => {
                    input.setAttribute('autocomplete', 'name');
                });
                
                // Address inputs
                document.querySelectorAll('input[name*="address"], input[name*="Address"], textarea[name*="address"]').forEach(input => {
                    input.setAttribute('autocomplete', 'street-address');
                });
            };

            // ---- INITIALIZATION ----
            document.addEventListener('DOMContentLoaded', function() {
                GR.utils.initTheme();
                GR.utils.showFlashMessages();
                GR.utils.initPasswordToggles();
                GR.utils.initFormLoading();
                GR.utils.initNavbarScroll();
                GR.utils.initPWA();
                GR.utils.initWebSocket();
                GR.utils.enhanceFormInputs();
                
                // Initialize Bootstrap tooltips
                document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
                
                // Initialize Bootstrap popovers
                document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el => new bootstrap.Popover(el));
                
                console.log('GhanaRide Design System initialized v5.2');
            });

        })();
    </script>

    <!-- Page-specific inline scripts (if any) -->
    <th:block th:if="${pageScript != null}" th:inline="javascript">
        [[${pageScript}]]
    </th:block>

</th:block>
</body>
</html>
