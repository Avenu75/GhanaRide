<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="headContent(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- SEO Meta Tags -->
    <title th:text="${title}">GhanaRide — Ghana's Trusted Transport Platform</title>
    <meta name="description" th:content="${pageDescription ?: 'Book affordable intercity and campus rides with trusted drivers across Ghana. Safe, timely, and easy.'}">
    <meta name="theme-color" content="#FCD116">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GhanaRide">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="GhanaRide">
    <meta property="og:title" th:content="${title ?: 'GhanaRide — Ghana\\'s Trusted Transport Platform'}">
    <meta property="og:description" th:content="${pageDescription ?: 'Book affordable intercity and campus rides with trusted drivers across Ghana. Safe, timely, and easy.'}">
    <meta property="og:url" th:content="${pageUrl ?: 'https://ghanaride.me/'}">
    <meta property="og:image" content="https://ghanaride.me/images/og-banner.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@GhanaRide">
    <meta name="twitter:title" th:content="${title ?: 'GhanaRide'}">
    <meta name="twitter:description" th:content="${pageDescription ?: 'Book affordable intercity rides across Ghana'}">
    <meta name="twitter:image" content="https://ghanaride.me/images/og-banner.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" th:href="${pageUrl ?: 'https://ghanaride.me/'}">
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://js.paystack.co">
    <link rel="preconnect" href="https://accounts.google.com">
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://js.paystack.co">
    <link rel="dns-prefetch" href="https://accounts.google.com">
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="/images/icon-192.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/images/icon-512.png">
    
    <!-- Fonts: Outfit (headings) + Inter (body) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"></noscript>
    
    <!-- Bootstrap 5.3 + Bootstrap Icons -->
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"></noscript>
    
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></noscript>
    
    <!-- Custom CSS (Design System) -->
    <link rel="preload" as="style" href="/css/ghanaride.css">
    <link rel="stylesheet" href="/css/ghanaride.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/css/ghanaride.css"></noscript>
    
    <!-- Theme Color Meta (updated by JS for dark mode) -->
    <meta name="theme-color" content="#FCD116" id="theme-color-meta">
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json" th:inline="javascript">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "GhanaRide",
      "url": "https://ghanaride.me",
      "logo": "https://ghanaride.me/images/icon-192.png",
      "description": "Ghana's trusted campus and intercity transport booking platform",
      "telephone": "+233-55-773-4624",
      "email": "support@ghanaride.me",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Transport Avenue",
        "addressLocality": "East Legon",
        "addressRegion": "Greater Accra",
        "postalCode": "GA-123-4567",
        "addressCountry": "GH"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 5.6037,
        "longitude": -0.1870
      },
      "currenciesAccepted": "GHS",
      "paymentAccepted": "Cash, Credit Card, Mobile Money, Paystack, Wallet",
      "areaServed": "GH",
      "priceRange": "GH₵20 - GH₵500"
    }
    </script>
</head>
</html>
