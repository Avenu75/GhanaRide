<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Available Rides — GhanaRide</title>
    <meta name="description" content="Find and book your next trip across Ghana. Filter by city, date, and price.">
    <meta name="theme-color" content="#FCD116">
</head>
<body>
<main th:fragment="main">
    <div class="container py-4">
        <!-- Page Header -->
        <div class="text-center mb-5 animate-slide-up">
            <h1 class="display-5 fw-bold" style="font-family: 'Outfit', sans-serif;">Available Rides</h1>
            <p class="text-muted fs-5">Find and book your next trip across Ghana</p>
        </div>

        <!-- Search Card -->
        <div class="card border-0 shadow-sm rounded-4 mb-5 p-4 bg-surface animate-slide-up stagger-1" style="background: var(--color-surface);">
            <form th:action="@{/rides}" method="get" class="row g-3 align-items-end" role="search" aria-label="Search rides">
                <div class="col-md-3">
                    <label for="fromLocation" class="form-label">Leaving from</label>
                    <div class="form-floating">
                        <select id="fromLocation" name="from" class="form-select" aria-label="Departure city">
                            <option value="">Any city</option>
                            <option th:each="loc : ${locations}" th:value="${loc}" th:text="${loc}" th:selected="${loc == searchFrom}"></option>
                        </select>
                        <label for="fromLocation"><i class="bi bi-geo-alt me-2"></i>Leaving from</label>
                    </div>
                </div>
                
                <div class="col-md-3">
                    <label for="toLocation" class="form-label">Going to</label>
                    <div class="form-floating">
                        <select id="toLocation" name="to" class="form-select" aria-label="Destination city">
                            <option value="">Any city</option>
                            <option th:each="loc : ${locations}" th:value="${loc}" th:text="${loc}" th:selected="${loc == searchTo}"></option>
                        </select>
                        <label for="toLocation"><i class="bi bi-geo-alt-fill me-2"></i>Going to</label>
                    </div>
                </div>
                
                <div class="col-md-3">
                    <label for="date" class="form-label">Date (Optional)</label>
                    <div class="form-floating">
                        <input type="date" id="date" name="date" class="form-control" th:value="${searchDate}" aria-label="Travel date">
                        <label for="date"><i class="bi bi-calendar3 me-2"></i>Date</label>
                    </div>
                </div>
                
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100 py-3 btn-pill" style="height: 56px;">
                        <i class="bi bi-search me-2"></i>Search Rides
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div th:if="${isSearchResult}" class="animate-slide-up stagger-2">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Search Results</h4>
                <a th:href="@{/rides}" class="btn btn-sm btn-outline-secondary">Clear Search</a>
            </div>
            
            <div th:if="${trips == null || trips.isEmpty()}" class="text-center py-5">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 80px; height: 80px; background: var(--color-border);">
                    <i class="bi bi-search text-muted fs-1"></i>
                </div>
                <h4 class="fw-bold">No rides found</h4>
                <p class="text-muted">We couldn't find any trips matching your search criteria. Try different cities or dates.</                <a th:href="@{/rides}" class="btn btn-primary mt-2">View All Rides</a>
            </div>

            <div th:unless="${trips == null || trips.isEmpty()}" class="row g-4">
                <div th:each="trip : ${trips}" class="col-md-6 col-lg-4">
                    <div class="card h-100 trip-card">
                        <div class="card-body">
                            <!-- Header: Company & Price -->
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <span class="badge bg-success mb-2" th:if="${trip.company != null}">
                                        <i class="bi bi-building me-1"></i><span th:text="${trip.company.companyName}">Company</span>
                                    </span>
                                    <span class="badge bg-info mb-2" th:unless="${trip.company != null}">
                                        <i class="bi bi-person me-1"></i>Independent
                                    </span>
                                </div>
                                <div class="trip-price">
                                    GH₵ <span th:text="${#numbers.formatDecimal(trip.tripAmount, 1, 2, 'COMMA')}">0.00</span>
                                </div>
                            </div>

                            <!-- Route -->
                            <div class="d-flex align-items-center mb-3">
                                <div class="d-flex flex-column align-items-center me-3">
                                    <i class="bi bi-circle text-success small"></i>
                                    <div style="width: 2px; height: 20px; background: var(--color-border);"></div>
                                    <i class="bi bi-geo-alt-fill text-danger small"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold fs-5" th:text="${trip.fromLocation}">From</div>
                                    <div class="fw-bold fs-5" th:text="${trip.toLocation}">To</div>
                                </div>
                            </div>

                            <!-- Details -->
                            <div class="trip-details">
                                <div class="trip-detail">
                                    <i class="bi bi-calendar3"></i>
                                    <span th:text="${#temporals.format(trip.departureTime, 'MMM dd, yyyy')}">Date</span>
                                </div>
                                <div class="trip-detail">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${#temporals.format(trip.departureTime, 'HH:mm')}">Time</span>
                                </div>
                                <div class="trip-detail">
                                    <i class="bi bi-car-front"></i>
                                    <span th:text="${trip.car != null ? trip.car.model : 'Standard'}">Car</span>
                                </div>
                                <div class="trip-detail">
                                    <i class="bi bi-people"></i>
                                    <span th:text="${trip.availableSeats} + ' seats left'">Seats</span>
                                </div>
                            </div>
                        </div>

                        <!-- Status/Action -->
                        <div class="mt-auto">
                            <div th:if="${trip.status.name() == 'FULL' || trip.availableSeats == 0}" class="alert alert-danger mb-0 py-2">
                                <i class="bi bi-x-circle me-1"></i> Fully Booked
                            </div>
                            <a th:unless="${trip.status.name() == 'FULL' || trip.availableSeats == 0}"
                               th:href="@{/booking/{id}(id=${trip.id})}"
                               class="btn btn-warning w-100 text-dark fw-bold">
                                Book Now <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${trips != null and trips.hasNext()}" aria-label="Pagination" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item">
                    <a class="page-link" th:href="@{/rides(page=${trips.number-1}, from=${searchFrom}, to=${searchTo}, date=${searchDate})}" aria-label="Previous">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item active" aria-current="page">
                    <span class="page-link" th:text="${trips.number + 1}">1</span>
                </li>
                <li class="page-item">
                    <a class="page-link" th:href="@{/rides(page=${trips.number+1}, from=${searchFrom}, to=${searchTo}, date=${searchDate})}" aria-label="Next">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
</body>
</html>
