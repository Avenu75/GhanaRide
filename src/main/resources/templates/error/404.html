<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Not Found — GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="error-page flex-column gap-4">
            <div class="error-code">404</div>
            <div>
                <h1 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif;">Page Not Found</h1>
                <p class="text-muted fs-5 mb-4">The page you're looking for doesn't exist or has been moved.</p>
                <p class="text-muted mb-5">
                    Maybe you're looking for
                    <a th:href="@{/register}" class="text-success text-decoration-none">booking a ride</a> or
                    <a th:href="@{/contact}" class="text-success text-decoration-none">contacting support</a>?
                </p>
                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <a th:href="@{/}" class="btn btn-primary px-4 py-2">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <a th:href="@{/register}" class="btn btn-warning px-4 py-2">
                        <i class="bi bi-ticket me-2"></i>Book a Ride
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
