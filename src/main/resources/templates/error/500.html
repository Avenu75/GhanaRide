<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Server Error — GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="error-page flex-column gap-4">
            <div class="error-code">500</div>
            <div>
                <h1 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif;">Something Went Wrong</h1>
                <p class="text-muted fs-5 mb-4">We're experiencing a temporary issue. Our team has been notified.</p>
                <p class="text-muted mb-5">
                    Please try again in a few minutes. If the problem persists,
                    <a th:href="@{/contact}" class="text-success text-decoration-none">contact our support team</a>.
                </p>
                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <button onclick="window.location.reload()" class="btn btn-primary px-4 py-2">
                        <i class="bi bi-arrow-clockwise me-2"></i>Try Again
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary px-4 py-2">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
