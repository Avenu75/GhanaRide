<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Error 403 — Access Denied | GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="error-page flex-column gap-4">
            <div class="error-code">403</div>
            <div>
                <h1 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif;">Access Denied</h1>
                <p class="text-muted fs-5 mb-4">You don't have permission to view this page.</p>
                <p class="text-muted mb-5">
                    If you believe this is a mistake, please
                    <a th:href="@{/contact}" class="text-success text-decoration-none">contact our support team</a>.
                </p>
                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <a th:href="@{/}" class="btn btn-primary px-4 py-2">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <a th:href="@{/contact}" class="btn btn-outline-secondary px-4 py-2">
                        <i class="bi bi-headset me-2"></i>Get Help
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
