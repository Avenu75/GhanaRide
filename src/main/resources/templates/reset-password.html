<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password - GhanaRide</title>
    <style>
        .strength-meter {
            height: 6px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 3px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 5px;
        }
        body.light-mode .strength-meter {
            background-color: rgba(0,0,0,0.1);
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <main th:fragment="main">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2 class="text-light"><i class="bi bi-key-fill text-warning"></i> Reset Password</h2>
                <p class="text-muted">Enter a new secure password for your account.</p>
            </div>
            
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">
                Error occurred.
            </div>

            <form th:action="@{/reset-password}" method="post" id="resetForm" onsubmit="return validatePasswords()">
                <input type="hidden" name="token" th:value="${token}">
                
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" required oninput="checkStrength()">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('password', 'passwordToggleIcon')">
                            <i class="bi bi-eye-fill" id="passwordToggleIcon"></i>
                        </button>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="form-text text-muted small mt-1" id="strengthText">Password must be at least 6 characters.</div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('confirmPassword', 'confirmPasswordToggleIcon')">
                            <i class="bi bi-eye-fill" id="confirmPasswordToggleIcon"></i>
                        </button>
                    </div>
                    <div class="form-text text-danger d-none" id="matchText">Passwords do not match.</div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Change Password</button>
                </div>
            </form>
        </div>

        <script>
            function togglePasswordVisibility(fieldId, iconId) {
                const passwordField = document.getElementById(fieldId);
                const icon = document.getElementById(iconId);
                if (passwordField.type === "password") {
                    passwordField.type = "text";
                    icon.classList.replace("bi-eye-fill", "bi-eye-slash-fill");
                } else {
                    passwordField.type = "password";
                    icon.classList.replace("bi-eye-slash-fill", "bi-eye-fill");
                }
            }

            function checkStrength() {
                const pass = document.getElementById('password').value;
                const bar = document.getElementById('strengthBar');
                const text = document.getElementById('strengthText');
                
                let score = 0;
                if (pass.length >= 6) score += 1;
                if (pass.match(/[a-z]/) && pass.match(/[A-Z]/)) score += 1;
                if (pass.match(/\d/)) score += 1;
                if (pass.match(/[^a-zA-Z\d]/)) score += 1;

                let width = "0%";
                let color = "";
                let desc = "";

                if (pass.length === 0) {
                    desc = "Password must be at least 6 characters.";
                } else if (pass.length < 6) {
                    width = "25%";
                    color = "#CE1126"; // red
                    desc = "Too short (Min 6 characters)";
                } else {
                    switch (score) {
                        case 1:
                            width = "40%";
                            color = "#CE1126"; // red
                            desc = "Weak password";
                            break;
                        case 2:
                            width = "60%";
                            color = "#FCD116"; // gold
                            desc = "Moderate password";
                            break;
                        case 3:
                            width = "80%";
                            color = "#006B3F"; // green
                            desc = "Strong password";
                            break;
                        case 4:
                            width = "100%";
                            color = "#006B3F"; // green
                            desc = "Very strong password";
                            break;
                    }
                }

                bar.style.width = width;
                bar.style.backgroundColor = color;
                text.textContent = desc;
            }

            function validatePasswords() {
                const pass = document.getElementById('password').value;
                const confirm = document.getElementById('confirmPassword').value;
                const matchText = document.getElementById('matchText');

                if (pass.length < 6) {
                    return false;
                }

                if (pass !== confirm) {
                    matchText.classList.remove('d-none');
                    return false;
                }
                matchText.classList.add('d-none');
                return true;
            }
        </script>
    </main>
</body>
</html>
