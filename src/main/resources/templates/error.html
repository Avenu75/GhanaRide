<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <div class="container text-center py-5">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
            </div>
            <h2 class="text-light mb-3">Something went wrong</h2>
            <p class="text-muted mb-4">We're sorry, but an error occurred while processing your request.</p>
            <a th:href="@{/}" class="btn btn-warning px-4">Return Home</a>
        </div>
    </main>
</body>
</html>
