<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2 class="text-light"><i class="bi bi-bus-front text-warning"></i> GhanaRide</h2>
                <p class="text-muted">Create an account to start booking or driving.</p>
            </div>
            
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">
                Error message
            </div>

            <form th:action="@{/register}" method="post" th:object="${user}">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required>
                </div>
                <div class="mb-3">
                    <label for="phoneNumber" class="form-label">Phone Number</label>
                    <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label d-block">I want to register as a:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="role" id="roleUser" value="USER" checked>
                        <label class="form-check-label" for="roleUser">Passenger</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="role" id="roleDriver" value="DRIVER">
                        <label class="form-check-label" for="roleDriver">Driver</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning btn-lg">Register Account</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a th:href="@{/login}" class="text-success text-decoration-none">Login here</a></p>
            </div>
        </div>
    </main>
</body>
</html>
