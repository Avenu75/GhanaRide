<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - GhanaRide</title>
</head>
<body>
<main th:fragment="main" class="d-flex align-items-center justify-content-center py-5" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg rounded-4 bg-card" style="width: 100%; max-width: 600px;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3 shadow-sm" style="width: 60px; height: 60px; background-color: rgba(252,209,22,0.15); color: #FCD116;">
                    <i class="bi bi-person-plus-fill fs-2"></i>
                </div>
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted small">Join GhanaRide to start booking or driving</p>
            </div>

            <!-- General Error Alert Banner -->
            <div th:if="${error}" class="alert alert-danger d-flex align-items-center rounded-3 mb-4 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-3"></i>
                <div th:text="${error}">Error message</div>
            </div>

            <form th:action="@{/register}" method="post" th:object="${registerDTO}">

                <!-- Account Type Selection -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-muted small mb-3">Register as:</label>
                    <div class="row g-2">
                        <div class="col-4">
                            <div class="account-type-card h-100 text-center p-3 rounded-4 border bg-body shadow-sm" id="cardPassenger" onclick="selectType('passenger')" style="cursor:pointer;">
                                <i class="bi bi-person-fill fs-3 text-info mb-1 d-block"></i>
                                <div class="fw-bold fs-6 text-body">Passenger</div>
                                <small class="text-muted d-none d-sm-block" style="font-size: 0.75rem;">Book rides</small>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="account-type-card h-100 text-center p-3 rounded-4 border bg-body shadow-sm" id="cardDriver" onclick="selectType('driver')" style="cursor:pointer;">
                                <i class="bi bi-car-front-fill fs-3 text-warning mb-1 d-block"></i>
                                <div class="fw-bold fs-6 text-body">Driver</div>
                                <small class="text-muted d-none d-sm-block" style="font-size: 0.75rem;">Drive & earn</small>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="account-type-card h-100 text-center p-3 rounded-4 border bg-body shadow-sm" id="cardCompany" onclick="selectType('company')" style="cursor:pointer;">
                                <i class="bi bi-building-fill fs-3 text-success mb-1 d-block"></i>
                                <div class="fw-bold fs-6 text-body">Company</div>
                                <small class="text-muted d-none d-sm-block" style="font-size: 0.75rem;">Manage fleet</small>
                            </div>
                        </div>
                    </div>
                    <!-- Hidden input to send accountType value (bound to RegisterDTO) -->
                    <input type="hidden" th:field="*{accountType}" id="accountTypeInput">
                </div>

                <!-- Personal / Admin Information (always visible) -->
                <div id="personalSection" class="bg-body p-4 rounded-4 border mb-4">
                    <h6 class="fw-bold mb-3" id="personalTitle" style="color: #FCD116;">Personal Information</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label fw-medium text-muted small" id="nameLabel">Full Name</label>
                            <input type="text" class="form-control bg-card custom-input" id="fullName" th:field="*{fullName}" required>
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="username" class="form-label fw-medium text-muted small">Username</label>
                            <input type="text" class="form-control bg-card custom-input" id="username" th:field="*{username}" required>
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-medium text-muted small" id="emailLabel">Email Address</label>
                            <input type="email" class="form-control bg-card custom-input" id="email" th:field="*{email}" required>
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="phoneNumber" class="form-label fw-medium text-muted small" id="phoneLabel">Phone Number</label>
                            <input type="text" class="form-control bg-card custom-input" id="phoneNumber" th:field="*{phone}">
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                    </div>
                </div>

                <!-- Company-only Section -->
                <div id="companySection" class="bg-body p-4 rounded-4 border mb-4" style="display: none; opacity: 0; transition: opacity 0.5s ease;">
                    <h6 class="fw-bold mb-3" style="color: #FCD116;">Company Information</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="companyName" class="form-label fw-medium text-muted small">Company Name</label>
                            <input type="text" class="form-control bg-card custom-input" id="companyName" name="companyName">
                        </div>
                        <div class="col-md-6">
                            <label for="companyEmail" class="form-label fw-medium text-muted small">Company Email</label>
                            <input type="email" class="form-control bg-card custom-input" id="companyEmail" name="companyEmail">
                        </div>
                        <div class="col-md-6">
                            <label for="companyPhone" class="form-label fw-medium text-muted small">Company Phone</label>
                            <input type="text" class="form-control bg-card custom-input" id="companyPhone" name="companyPhone">
                        </div>
                        <div class="col-md-6">
                            <label for="registrationNumber" class="form-label fw-medium text-muted small">Registration No. (Optional)</label>
                            <input type="text" class="form-control bg-card custom-input" id="registrationNumber" name="registrationNumber">
                        </div>
                        <div class="col-12">
                            <label for="companyLocation" class="form-label fw-medium text-muted small">Location / Address</label>
                            <input type="text" class="form-control bg-card custom-input" id="companyLocation" name="companyLocation">
                        </div>
                        <div class="col-12">
                            <label for="companyDescription" class="form-label fw-medium text-muted small">Company Description</label>
                            <textarea class="form-control bg-card custom-input" id="companyDescription" name="companyDescription" rows="2"></textarea>
                        </div>
                    </div>
                </div>

                <div class="bg-body p-4 rounded-4 border mb-4">
                    <h6 class="fw-bold mb-3" style="color: #FCD116;">Security</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="password" class="form-label fw-medium text-muted small">Password</label>
                            <input type="password" class="form-control bg-card custom-input" id="password" th:field="*{password}" required>
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="confirmPassword" class="form-label fw-medium text-muted small">Confirm Password</label>
                            <input type="password" class="form-control bg-card custom-input" id="confirmPassword" th:field="*{confirmPassword}" required>
                            <div class="text-danger small mt-1 fw-medium" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning py-3 fw-bold fs-5 shadow-sm mb-3" style="background-color: #FCD116; border: none;">
                        Create Account
                    </button>

                    <div class="position-relative mb-3 text-center">
                        <hr class="text-secondary opacity-25">
                        <span class="position-absolute top-50 start-50 translate-middle px-3 text-muted small bg-card">OR</span>
                    </div>

                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2 rounded-3 text-body bg-body shadow-sm hover-bg-light border-secondary-subtle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        <span class="fw-medium">Sign in with Google</span>
                    </a>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted small mb-0">Already have an account?
                    <a th:href="@{/login}" class="fw-bold text-decoration-none" style="color: #0F9D58;">Login here</a>
                </p>
            </div>
        </div>

        <style>
            .custom-input:focus {
                box-shadow: 0 0 0 0.25rem rgba(252, 209, 22, 0.25) !important;
                border-color: #FCD116 !important;
            }
            .account-type-card {
                transition: all 0.2s ease;
            }
            .account-type-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            }
            .account-type-card.selected {
                border-color: #FCD116 !important;
                background-color: rgba(252, 209, 22, 0.1) !important;
                transform: translateY(-3px);
                box-shadow: 0 4px 15px rgba(252, 209, 22, 0.2) !important;
            }
            .hover-bg-light:hover {
                background-color: var(--bs-secondary-bg) !important;
            }
        </style>

        <script>
            function selectType(type) {
                // Update hidden input
                document.getElementById('accountTypeInput').value = type;

                // Update card selection style
                const cards = document.querySelectorAll('.account-type-card');
                cards.forEach(c => c.classList.remove('selected'));
                document.getElementById('card' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');

                const companySection = document.getElementById('companySection');
                const personalTitle = document.getElementById('personalTitle');
                const nameLabel = document.getElementById('nameLabel');
                const emailLabel = document.getElementById('emailLabel');
                const phoneLabel = document.getElementById('phoneLabel');

                if (type === 'company') {
                    // Show company section
                    companySection.style.display = 'block';
                    setTimeout(() => { companySection.style.opacity = '1'; }, 10);

                    // Update labels for admin
                    personalTitle.innerText = 'Admin Information';
                    nameLabel.innerText = 'Admin Full Name';
                    emailLabel.innerText = 'Admin Email';
                    phoneLabel.innerText = 'Admin Phone';

                    // Require company fields
                    document.getElementById('companyName').required = true;
                    document.getElementById('companyEmail').required = true;
                    document.getElementById('companyPhone').required = true;
                    document.getElementById('companyLocation').required = true;
                } else {
                    // Hide company section
                    companySection.style.opacity = '0';
                    setTimeout(() => { companySection.style.display = 'none'; }, 300);

                    // Remove required on company fields
                    document.getElementById('companyName').required = false;
                    document.getElementById('companyEmail').required = false;
                    document.getElementById('companyPhone').required = false;
                    document.getElementById('companyLocation').required = false;

                    // Restore labels
                    personalTitle.innerText = 'Personal Information';
                    nameLabel.innerText = 'Full Name';
                    emailLabel.innerText = 'Email Address';
                    phoneLabel.innerText = 'Phone Number';
                }
            }

            // Auto-select saved account type on load (preserves selection after validation errors)
            document.addEventListener('DOMContentLoaded', () => {
                let savedType = document.getElementById('accountTypeInput').value;
                if (!savedType || savedType.trim() === '') {
                    savedType = 'passenger';
                }
                selectType(savedType);
            });
        </script>
    </div>
</main>
</body>
</html>
