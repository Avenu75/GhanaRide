<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2 class="text-light"><i class="bi bi-bus-front text-warning"></i> GhanaRide</h2>
                <p class="text-muted">Welcome back! Please login to your account.</p>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out successfully.
            </div>
            <div th:if="${param.registered}" class="alert alert-success" role="alert">
                Registration successful! Please login.
            </div>
            <div th:if="${param.resetSuccess}" class="alert alert-success" role="alert">
                Password successfully changed. Please login with your new password.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                    <div class="text-end mt-1">
                        <a th:href="@{/forgot-password}" class="text-warning text-decoration-none small">Forgot Password?</a>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Don't have an account? <a th:href="@{/register}" class="text-warning text-decoration-none">Register here</a></p>
            </div>
        </div>
    </main>
</body>
</html>
