<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>GhanaRide — Login</title>
    <meta name="description" content="Sign in to your GhanaRide account to book rides, manage bookings, and access your wallet.">
</head>
<body>
<main th:fragment="main">
    <div class="container auth-page">
        <div class="auth-card animate-scale-in">
            <!-- Logo & Title -->
            <div class="auth-header">
                <a th:href="@{/}" class="auth-logo text-decoration-none">
                    <img th:src="@{/images/icon-192.svg}" alt="GhanaRide" width="40" height="40" class="rounded-circle bg-gold-subtle p-1">
                    <span class="fw-bold fs-4 text-gold" style="font-family: 'Outfit', sans-serif;">GhanaRide</span>
                </a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to book rides, manage bookings, and access your wallet</p>
            </div>
            
            <!-- Google OAuth -->
            <div class="social-login">
                <a th:href="@{/oauth2/authorization/google}" class="social-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>Continue with Google</span>
                </a>
            </div>
            
            <div class="divider">or</div>
            
            <!-- Login Form -->
            <form th:action="@{/login}" method="post" class="needs-validation" novalidate data-loading>
                <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                
                <!-- Username/Email -->
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control" id="username" placeholder="Username or Email" required autocomplete="username" th:value="${#request.getParameter('username')}">
                    <label for="username"><i class="bi bi-person me-2"></i>Username or email</label>
                    <div class="invalid-feedback">Please enter your username or email</div>
                </div>
                
                <!-- Password -->
                <div class="form-floating mb-3">
                    <input type="password" name="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
                    <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
                    <div class="invalid-feedback">Please enter your password</div>
                    <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="remember-forgot">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                        <label class="form-check-label" for="rememberMe">Remember me (14 days)</label>
                    </div>
                    <a th:href="@{/forgot-password}" class="forgot-link">Forgot password?</a>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-submit btn-pill">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loading d-none"><i class="bi bi-arrow-clockwise spin me-2"></i>Signing in...</span>
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a th:href="@{/register}">Create one free</a>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    // Password Toggle
    document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
            const targetId = this.dataset.togglePassword;
            const target = document.getElementById(targetId);
            const icon = this.querySelector('i');
            
            if (target.type === 'password') {
                target.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                target.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    });
    
    // Form Loading State
    document.querySelector('form[data-loading]').addEventListener('submit', function(e) {
        const submitBtn = this.querySelector('button[type="submit"]');
        if (submitBtn && this.checkValidity()) {
            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').classList.add('d-none');
            submitBtn.querySelector('.btn-loading').classList.remove('d-none');
        }
    });
    
    // Bootstrap Validation
    (function() {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function(form) {
            form.addEventListener('submit', function(event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
