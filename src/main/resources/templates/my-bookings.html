<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <h2 class="text-light mb-4">My Bookings</h2>
        
        <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info text-center py-5">
            <i class="bi bi-journal-x fs-1 d-block mb-3"></i>
            <h4>No bookings yet</h4>
            <p>You haven't booked any trips yet. <a th:href="@{/dashboard}" class="alert-link">Browse available trips</a> to get started!</p>
        </div>
        
        <div th:if="${not #lists.isEmpty(bookings)}" class="card bg-transparent border-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle border border-secondary rounded">
                    <thead class="table-dark text-warning">
                        <tr>
                            <th>Reference</th>
                            <th>Route</th>
                            <th>Date & Time</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td>
                                <span class="font-monospace text-light" th:text="${booking.bookingReference}">REF</span>
                            </td>
                            <td>
                                <span th:text="${booking.trip.fromLocation}">From</span> &rarr; <span th:text="${booking.trip.toLocation}">To</span>
                                <div class="small text-muted" th:text="${booking.trip.driver.fullName}">Driver</div>
                            </td>
                            <td>
                                <span th:text="${#temporals.format(booking.trip.departureTime, 'dd MMM yyyy')}">Date</span>
                                <div class="small text-muted" th:text="${#temporals.format(booking.trip.departureTime, 'h:mm a')}">Time</div>
                            </td>
                            <td class="text-warning fw-bold">
                                GHC <span th:text="${booking.totalAmount}">0.00</span>
                            </td>
                            <td>
                                <span th:if="${booking.status.name() == 'CONFIRMED'}" class="badge badge-approved rounded-pill">CONFIRMED</span>
                                <span th:if="${booking.status.name() == 'CANCELLED'}" class="badge badge-rejected rounded-pill">CANCELLED</span>
                            </td>
                            <td>
                                <a th:href="@{/booking/receipt/{id}(id=${booking.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-receipt"></i> Receipt
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
