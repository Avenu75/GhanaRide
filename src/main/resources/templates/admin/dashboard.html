<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-light mb-1">Admin Dashboard</h2>
            <p class="text-muted mb-0">System Overview & Statistics</p>
        </div>
        <div>
            <a th:href="@{/admin/trips}" class="btn btn-outline-warning me-2">
                <i class="bi bi-signpost-2"></i> Manage Trips
            </a>
            <a th:href="@{/admin/users}" class="btn btn-outline-warning me-2">
                <i class="bi bi-people"></i> Manage Users
            </a>
            <a th:href="@{/admin/bookings}" class="btn btn-outline-info">
                <i class="bi bi-ticket-perforated"></i> Manage Bookings
            </a>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <!-- Users Stat -->
        <div class="col-md-4">
            <div class="stat-card" style="border-top: 3px solid var(--ghana-green);">
                <i class="bi bi-people stat-icon text-success"></i>
                <h6 class="text-muted text-uppercase mb-2">Total Users</h6>
                <div class="stat-value text-light" th:text="${totalUsers}">0</div>
            </div>
        </div>

        <!-- Drivers Stat -->
        <div class="col-md-4">
            <div class="stat-card" style="border-top: 3px solid var(--ghana-gold);">
                <i class="bi bi-car-front stat-icon text-warning"></i>
                <h6 class="text-muted text-uppercase mb-2">Total Drivers</h6>
                <div class="stat-value text-light" th:text="${totalDrivers}">0</div>
            </div>
        </div>

        <!-- Bookings Stat -->
        <div class="col-md-4">
            <div class="stat-card" style="border-top: 3px solid #0dcaf0;">
                <i class="bi bi-ticket-perforated stat-icon text-info"></i>
                <h6 class="text-muted text-uppercase mb-2">Total Bookings</h6>
                <div class="stat-value text-light" th:text="${totalBookings}">0</div>
            </div>
        </div>
    </div>

    <h4 class="text-light mb-3 mt-4">Trip Statistics</h4>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="stat-card bg-dark border">
                <h6 class="text-muted text-uppercase mb-2">All Trips</h6>
                <div class="stat-value text-light" th:text="${totalTrips}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-dark border-warning">
                <h6 class="text-warning text-uppercase mb-2">Pending Approval</h6>
                <div class="stat-value text-warning" th:text="${pendingTrips}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-dark border-success">
                <h6 class="text-success text-uppercase mb-2">Approved Trips</h6>
                <div class="stat-value text-success" th:text="${approvedTrips}">0</div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
