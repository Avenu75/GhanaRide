<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Live Track — GhanaRide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<main th:fragment="main" class="p-0">
    <style>
        #boltMap{width:100%;height:calc(100vh - 76px);position:relative}
        .bolt-panel{position:absolute;left:16px;right:16px;bottom:20px;z-index:500;background:var(--card-bg);border:1px solid var(--border-color);border-radius:20px;box-shadow:var(--shadow-lg);padding:16px 18px;max-width:520px;margin:auto}
        @media(min-width:900px){.bolt-panel{left:24px;right:auto;width:420px;bottom:28px}}
        .eta-big{font-size:2rem;font-weight:800;font-family:Outfit,sans-serif}
        .gh-pill{background:rgba(15,157,88,.12);color:#4ade80;border:1px solid rgba(15,157,88,.25);padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700}
        .driver-row{display:flex;align-items:center;gap:12px;margin-top:10px}
        .driver-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FCD116,#0F9D58);display:flex;align-items:center;justify-content:center;font-weight:800;color:#111}
        @keyframes pulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}
    </style>

    <div id="boltMap">
        <div id="map" style="width:100%;height:100%"></div>

        <div class="bolt-panel">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="gh-pill">🇬🇭 LIVE • GHANA ONLY</div>
                    <div class="eta-big mt-1"><span id="etaMin">42</span> min</div>
                    <div class="text-muted small">Arriving at <strong th:text="${trip.toLocation}">Kumasi</strong></div>
                </div>
                <div class="text-end">
                    <div class="fw-bold" th:text="${trip.fromLocation} + ' → ' + ${trip.toLocation}">Accra → Kumasi</div>
                    <div class="small text-muted" th:text="'#'+${booking.bookingReference}">GR-XXXX</div>
                    <div class="small" style="color:#0F9D58"><span id="liveSpeed">78</span> km/h • <span id="liveDist">124</span> km left</div>
                </div>
            </div>
            <div class="driver-row">
                <div class="driver-avatar" th:text="${trip.driver != null ? #strings.substring(trip.driver.fullName,0,1).toUpperCase() : 'D'}">D</div>
                <div class="flex-grow-1">
                    <div class="fw-bold" th:text="${trip.driver != null ? trip.driver.fullName : 'Verified GhanaRide driver'}">Driver</div>
                    <div class="small text-muted" th:text="${trip.car != null ? trip.car.carBrand + ' • ' + trip.car.numberPlate : 'AC Bus • Verified'}">Car</div>
                </div>
                <a th:if="${trip.driver != null and trip.driver.phoneNumber != null}" th:href="'tel:'+${trip.driver.phoneNumber}" class="btn btn-success rounded-circle" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center"><i class="bi bi-telephone-fill"></i></a>
                <button class="btn btn-outline-warning rounded-circle" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center" onclick="shareTrip()"><i class="bi bi-share-fill"></i></button>
            </div>
            <div class="d-flex gap-2 mt-3 small flex-wrap">
                <span class="badge bg-body border text-muted">🪑 Seat <span th:text="${booking.seatNumber}">12B</span></span>
                <span class="badge bg-body border text-muted">📍 <span th:text="${trip.pickupStation != null ? trip.pickupStation : trip.fromLocation + ' Station'}">Pickup</span></span>
                <span class="badge bg-success-subtle text-success border border-secondary">QR Ready</span>
                <span class="badge" style="background:rgba(252,209,22,.12);color:#FCD116;border:1px solid rgba(252,209,22,.25)">GHS Paid</span>
            </div>
        </div>

        <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;background:var(--card-bg);border:1px solid var(--border-color);border-radius:999px;padding:8px 16px;box-shadow:var(--shadow-md);font-weight:600;font-size:.9rem;">
            <span style="display:inline-block;width:8px;height:8px;background:#0F9D58;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite"></span>
            Live tracking • Ghana only • <span id="updateTime">now</span>
        </div>
    </div>

    <!-- Thymeleaf → JS bridge – ONLY variables here -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const GHANA_TRACK = {
            tripId: /*[[${trip.id}]]*/ 0,
            bookingRef: /*[[${booking.bookingReference}]]*/ 'GR-TEST',
            pickupLat: /*[[${pickupLat}]]*/ 5.6037,
            pickupLng: /*[[${pickupLng}]]*/ -0.1870,
            dropoffLat: /*[[${dropoffLat}]]*/ 6.6885,
            dropoffLng: /*[[${dropoffLng}]]*/ -1.6244,
            fromCity: /*[[${trip.fromLocation}]]*/ 'Accra',
            toCity: /*[[${trip.toLocation}]]*/ 'Kumasi',
            pickupName: /*[[${trip.pickupStation != null ? trip.pickupStation : trip.fromLocation + ' Station'}]]*/ 'Accra Station',
            driverName: /*[[${trip.driver != null ? trip.driver.fullName : 'Verified driver'}]]*/ 'Driver',
            googleMapsKey: /*[[${googleMapsApiKey}]]*/ '',
            mapProvider: /*[[${mapProvider}]]*/ 'osm'
        };
        /*]]>*/
    </script>

    <!-- GOOGLE MAPS – Bolt style – only if key present -->
    <div th:if="${mapProvider == 'google' and !#strings.isEmpty(googleMapsApiKey)}">
        <script th:inline="none">
            // ==== Google Maps – Ghana Only – Bolt style ====
            // Data injected via GHANA_TRACK object above – no Thymeleaf [[…]] in this block
            let gMap, gDriverMarker;
            function initMap(){
                const pickup = {lat: GHANA_TRACK.pickupLat, lng: GHANA_TRACK.pickupLng};
                const dropoff = {lat: GHANA_TRACK.dropoffLat, lng: GHANA_TRACK.dropoffLng};
                const ghanaBounds = {north:11.2, south:4.5, west:-3.3, east:1.2};
                gMap = new google.maps.Map(document.getElementById("map"), {
                    center: pickup, zoom: 7,
                    restriction: {latLngBounds: ghanaBounds, strictBounds: false},
                    styles: [
                        {elementType:"geometry",stylers:[{color:"#1a1a2e"}]},
                        {elementType:"labels.text.stroke",stylers:[{color:"#1a1a2e"}]},
                        {elementType:"labels.text.fill",stylers:[{color:"#8a8ab0"}]},
                        {featureType:"road",elementType:"geometry",stylers:[{color:"#2a2a44"}]},
                        {featureType:"road",elementType:"labels.text.fill",stylers:[{color:"#9aa0c0"}]},
                        {featureType:"water",elementType:"geometry",stylers:[{color:"#0e1628"}]},
                        {featureType:"poi",stylers:[{visibility:"off"}]},
                        {featureType:"transit",stylers:[{visibility:"off"}]}
                    ],
                    disableDefaultUI: true, zoomControl: true, fullscreenControl: true
                });
                new google.maps.Marker({position: pickup, map: gMap, title: GHANA_TRACK.pickupName,
                    icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:"#0F9D58",fillOpacity:1,strokeColor:"#fff",strokeWeight:2}});
                new google.maps.Marker({position: dropoff, map: gMap, title: GHANA_TRACK.toCity,
                    icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:"#FCD116",fillOpacity:1,strokeColor:"#111",strokeWeight:2}});
                gDriverMarker = new google.maps.Marker({
                    position: pickup, map: gMap,
                    icon:{url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="20" fill="%23FCD116" stroke="%23111" stroke-width="2"/><text x="22" y="28" text-anchor="middle" font-size="18">🚌</text></svg>'),
                        scaledSize: new google.maps.Size(44,44), anchor: new google.maps.Point(22,22)}, zIndex:999});
                const ds = new google.maps.DirectionsService();
                const dr = new google.maps.DirectionsRenderer({suppressMarkers:true, polylineOptions:{strokeColor:"#FCD116",strokeWeight:5,strokeOpacity:.95}});
                dr.setMap(gMap);
                ds.route({origin: pickup, destination: dropoff, travelMode: google.maps.TravelMode.DRIVING, region: "GH"},
                    (res,status)=>{ if(status==="OK") dr.setDirections(res); });
                startLiveGoogle();
            }
            let g_t=0;
            function startLiveGoogle(){
                setInterval(async ()=>{
                    try{
                        const r = await fetch('/api/trips/'+GHANA_TRACK.tripId+'/live');
                        if(!r.ok) return;
                        const j = await r.json();
                        let lat = j.lat ?? (GHANA_TRACK.pickupLat + (GHANA_TRACK.dropoffLat-GHANA_TRACK.pickupLat)*Math.min(1,g_t/220));
                        let lng = j.lng ?? (GHANA_TRACK.pickupLng + (GHANA_TRACK.dropoffLng-GHANA_TRACK.pickupLng)*Math.min(1,g_t/220));
                        lat = Math.max(4.5, Math.min(11.2, lat));
                        lng = Math.max(-3.3, Math.min(1.2, lng));
                        gDriverMarker.setPosition({lat,lng});
                        document.getElementById('etaMin').textContent = Math.max(1, j.eta_minutes ?? (42-Math.floor(g_t/5)));
                        document.getElementById('liveSpeed').textContent = j.speed_kmh ?? (65+Math.floor(Math.random()*20));
                        document.getElementById('liveDist').textContent = Math.max(2, 168-Math.floor(g_t*0.9));
                        document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('en-GH',{hour:'2-digit',minute:'2-digit'});
                        g_t++;
                    }catch(e){}
                }, 3500);
            }
            function shareTrip(){
                const url=window.location.href;
                if(navigator.share){navigator.share({title:'Track my GhanaRide',text:'Live 🇬🇭 '+GHANA_TRACK.fromCity+' → '+GHANA_TRACK.toCity,url});}
                else {navigator.clipboard.writeText(url); if(window.GhanaRide) GhanaRide.toast('Tracking link copied – Ghana only 🇬🇭','success');}
            }
            window.initMap = initMap;
            window.shareTrip = shareTrip;
        </script>
        <script async th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&callback=initMap&region=GH&language=en'"></script>
    </div>

    <!-- OSM FALLBACK – Ghana only – NO Thymeleaf [[ inside – uses GHANA_TRACK -->
    <div th:if="${mapProvider != 'google' or #strings.isEmpty(googleMapsApiKey)}">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            // OSM – 100% IDE clean, no [[...]] – reads GHANA_TRACK
            (function(){
                const pLat = GHANA_TRACK.pickupLat, pLng = GHANA_TRACK.pickupLng,
                    dLat = GHANA_TRACK.dropoffLat, dLng = GHANA_TRACK.dropoffLng,
                    tripId = GHANA_TRACK.tripId;

                const map = L.map('map', {
                    minZoom:6, maxZoom:18,
                    maxBounds: [ [4.2, -3.6], [11.5, 1.5] ]
                }).setView([pLat, pLng], 7);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution:'© OpenStreetMap • GhanaRide GHANA ONLY',
                    maxZoom: 19
                }).addTo(map);

                const pIcon = L.divIcon({html:'<div style="background:#0F9D58;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',iconSize:[18,18]});
                const dIcon = L.divIcon({html:'<div style="background:#FCD116;width:18px;height:18px;border-radius:50%;border:3px solid #111;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',iconSize:[18,18]});

                L.marker([pLat, pLng], {icon:pIcon}).addTo(map)
                    .bindPopup('📍 Pickup<br><b>'+GHANA_TRACK.pickupName+'</b><br>🇬🇭 Ghana');
                L.marker([dLat, dLng], {icon:dIcon}).addTo(map)
                    .bindPopup('🏁 '+GHANA_TRACK.toCity+'<br>🇬🇭 Ghana');

                const busIcon = L.divIcon({html:'<div style="background:#FCD116;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid #111;box-shadow:0 4px 16px rgba(252,209,22,.45)">🚌</div>',iconSize:[42,42],iconAnchor:[21,21]});
                const driverM = L.marker([pLat, pLng], {icon: busIcon}).addTo(map);

                const routeLine = L.polyline([ [pLat, pLng], [dLat, dLng] ], {color:'#FCD116',weight:5,opacity:.9,dashArray:'10,8'}).addTo(map);
                map.fitBounds(routeLine.getBounds(), {padding:[50,50]});

                let tt=0;
                setInterval(async ()=>{
                    try{
                        const r = await fetch('/api/trips/'+tripId+'/live');
                        const j = await r.json();
                        let lat = j.lat ?? (pLat + (dLat-pLat)*Math.min(1,tt/200));
                        let lng = pLng + (dLng-pLng)*Math.min(1,tt/200);
                        lat = Math.max(4.5, Math.min(11.2, lat));
                        lng = Math.max(-3.3, Math.min(1.2, lng));
                        driverM.setLatLng([lat,lng]);
                        document.getElementById('etaMin').textContent = j.eta_minutes ?? Math.max(1,42-Math.floor(tt/5));
                        document.getElementById('liveSpeed').textContent = j.speed_kmh ?? 72;
                        document.getElementById('liveDist').textContent = Math.max(2,168-Math.floor(tt));
                        document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('en-GH',{hour:'2-digit',minute:'2-digit'});
                        tt++;
                    }catch(e){}
                }, 3500);

                window.shareTrip = function(){
                    const u=window.location.href;
                    navigator.clipboard.writeText(u);
                    if(window.GhanaRide) GhanaRide.toast('🇬🇭 Tracking link copied!','success');
                    else alert('🇬🇭 Tracking link copied!\n'+u);
                };
            })();
        </script>
        <div style="position:absolute;top:70px;left:12px;z-index:600;background:rgba(12,12,24,.9);color:#FCD116;padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:700;border:1px solid rgba(252,209,22,.3)">🗺️ OSM Ghana • add GOOGLE_MAPS_API_KEY for Google Bolt</div>
    </div>

</main>
</body>
</html>
