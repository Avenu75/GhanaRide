<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::head}, ~{::main}, ~{::script})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password - GhanaRide</title>
</head>
<body>
<main th:fragment="main">
    <div class="auth-container">
        <div class="text-center mb-4">
            <h2 class="text-light"><i class="bi bi-shield-lock text-warning"></i> Recover Password</h2>
            <p class="text-muted">Enter your registered email address or username and we'll generate a secure reset link.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">
            Error occurred.
        </div>
        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}">
            Success message.
        </div>

        <form th:action="@{/forgot-password}" method="post" id="forgotForm" onsubmit="showLoading()">
            <div class="mb-4">
                <label for="emailOrUsername" class="form-label">Email or Username</label>
                <input type="text" class="form-control" id="emailOrUsername" name="emailOrUsername" required autofocus>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                    <span id="btnText">Send Reset Link</span>
                    <span id="loadingSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted">Remember your password? <a th:href="@{/login}" class="text-warning text-decoration-none">Back to Login</a></p>
        </div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('btnText').classList.add('d-none');
            document.getElementById('loadingSpinner').classList.remove('d-none');
        }
    </script>
</main>
</body>
</html>
