<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <div class="hero-section mb-4">
            <h2 class="text-light">Welcome back, <span class="text-warning" th:text="${currentUser.fullName}">User</span>!</h2>
            <p class="text-muted">Find your next ride across Ghana.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger mb-4">
            <span th:text="${param.error}">An error occurred.</span>
        </div>

        <h3 class="mb-3">Available Trips</h3>
        
        <div th:if="${#lists.isEmpty(trips)}" class="alert alert-info">
            No available trips at the moment. Please check back later!
        </div>

        <div class="row g-4" th:if="${not #lists.isEmpty(trips)}">
            <div class="col-md-6 col-lg-4" th:each="trip : ${trips}">
                <div class="card trip-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge badge-approved rounded-pill"><i class="bi bi-check-circle"></i> Available</span>
                            <span class="trip-price">GHC <span th:text="${trip.tripAmount}">0.00</span></span>
                        </div>
                        <h4 class="card-title text-light mb-1">
                            <span th:text="${trip.fromLocation}">From</span> 
                            <i class="bi bi-arrow-right text-muted mx-2"></i> 
                            <span th:text="${trip.toLocation}">To</span>
                        </h4>
                        
                        <hr class="border-secondary my-3">
                        
                        <div class="mb-2 text-muted">
                            <i class="bi bi-calendar3 me-2 text-warning"></i>
                            <span th:text="${#temporals.format(trip.departureTime, 'dd MMM yyyy, h:mm a')}">Date</span>
                        </div>
                        
                        <div class="mb-2 text-muted">
                            <i class="bi bi-person me-2"></i> Driver: <span class="text-light" th:text="${trip.driver.fullName}">Driver Name</span>
                        </div>
                        
                        <div class="mb-3 text-muted">
                            <i class="bi bi-car-front me-2"></i> <span th:text="${trip.car.carBrand}">Car</span> 
                            <small class="text-muted ms-1">(<span th:text="${trip.car.numberPlate}">Plate</span>)</small>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <div class="text-muted small">
                                <i class="bi bi-people me-1"></i> <span th:text="${trip.availableSeats}">0</span>/<span th:text="${trip.totalSeats}">0</span> seats
                            </div>
                            <a th:href="@{/booking/{id}(id=${trip.id})}" class="btn btn-primary btn-sm px-4">Book Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
