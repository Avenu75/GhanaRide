<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirm Booking - GhanaRide</title>
</head>
<body>
    <main th:fragment="main">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card trip-card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h3 class="text-light">Confirm Your Booking</h3>
                            <p class="text-muted">Please review the details before confirming.</p>
                        </div>
                        
                        <div class="bg-light rounded p-3 mb-4 border">
                            <div class="row mb-2">
                                <div class="col-5 text-muted">Route</div>
                                <div class="col-7 text-light fw-bold">
                                    <span th:text="${trip.fromLocation}">From</span> &rarr; <span th:text="${trip.toLocation}">To</span>
                                </div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-5 text-muted">Departure</div>
                                <div class="col-7 text-light">
                                    <span th:text="${#temporals.format(trip.departureTime, 'dd MMM yyyy, h:mm a')}">Date</span>
                                </div>
                            </div>
                            <div class="row mb-2" th:if="${trip.pickupStation != null and !trip.pickupStation.isEmpty()}">
                                <div class="col-5 text-muted">Pickup Station</div>
                                <div class="col-7 text-light">
                                    <span th:text="${trip.pickupStation}">Station</span>
                                </div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-5 text-muted">Driver</div>
                                <div class="col-7 text-light" th:text="${trip.driver.fullName}">Driver Name</div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-5 text-muted">Vehicle</div>
                                <div class="col-7 text-light">
                                    <span th:text="${trip.car.carBrand}">Car</span> (<span th:text="${trip.car.numberPlate}">Plate</span>)
                                </div>
                            </div>
                            <div class="row mb-2" th:if="${trip.description != null and !trip.description.isEmpty()}">
                                <div class="col-5 text-muted">Notes</div>
                                <div class="col-7 text-light fst-italic">
                                    <small th:text="${trip.description}">Description</small>
                                </div>
                            </div>
                            <hr class="border-secondary">
                            <div class="row align-items-center">
                                <div class="col-5 text-muted">Total Amount</div>
                                <div class="col-7 text-warning fs-4 fw-bold">
                                    GHC <span th:text="${trip.tripAmount}">0.00</span>
                                </div>
                            </div>
                        </div>

                        <form th:action="@{/booking/{id}(id=${trip.id})}" method="post">
                            <div class="mb-4">
                                <label class="form-label text-light fw-bold">Booking For:</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="bookingType" id="typeSelf" value="self" checked onchange="toggleRelativeFields()">
                                        <label class="form-check-label text-light" for="typeSelf">
                                            Myself
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="bookingType" id="typeRelative" value="relative" onchange="toggleRelativeFields()">
                                        <label class="form-check-label text-light" for="typeRelative">
                                            Someone Else
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div id="relativeFields" style="display: none;" class="bg-dark border border-secondary rounded p-3 mb-4">
                                <h6 class="text-warning mb-3">Passenger Details</h6>
                                <div class="mb-3">
                                    <label for="passengerName" class="form-label text-light">Passenger Name</label>
                                    <input type="text" class="form-control" id="passengerName" name="passengerName">
                                </div>
                                <div class="mb-3">
                                    <label for="passengerPhone" class="form-label text-light">Passenger Phone</label>
                                    <input type="text" class="form-control" id="passengerPhone" name="passengerPhone">
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-warning btn-lg">Proceed to Payment <i class="bi bi-arrow-right ms-2"></i></button>
                                <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function toggleRelativeFields() {
                const isRelative = document.getElementById('typeRelative').checked;
                const relativeFields = document.getElementById('relativeFields');
                const nameInput = document.getElementById('passengerName');
                const phoneInput = document.getElementById('passengerPhone');

                if (isRelative) {
                    relativeFields.style.display = 'block';
                    nameInput.required = true;
                    phoneInput.required = true;
                } else {
                    relativeFields.style.display = 'none';
                    nameInput.required = false;
                    phoneInput.required = false;
                }
            }
        </script>
    </main>
</body>
</html>
